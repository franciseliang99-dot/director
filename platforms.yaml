# director 平台预设
# 每个 platform id 决定:script-gen 传哪个 --platform、video-gen 用哪个 --aspect、picture-gen 出图分辨率

tiktok:
  aspect: "9:16"
  width: 1080
  height: 1920
  duration_default_s: 30
  duration_max_s: 60
  script_gen_platform: tiktok
  fps: 30

douyin:
  aspect: "9:16"
  width: 1080
  height: 1920
  duration_default_s: 30
  duration_max_s: 60
  script_gen_platform: douyin
  fps: 30

yt_short:
  aspect: "9:16"
  width: 1080
  height: 1920
  duration_default_s: 45
  duration_max_s: 60
  script_gen_platform: youtube  # V0.2.0+: native youtube; auto-short-form (duration<=60s)
  script_gen_variant: short     # explicit, in case duration tweaked >60 by mistake
  fps: 30

yt_landscape:
  aspect: "16:9"
  width: 1920
  height: 1080
  duration_default_s: 480
  duration_max_s: 1800
  script_gen_platform: youtube  # V0.2.0+: native youtube; auto-long-form (duration>60s)
  script_gen_variant: long      # explicit; chapter-structured, SEO title, thumbnail_text
  fps: 30
